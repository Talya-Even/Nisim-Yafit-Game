<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Run Nisim! Run!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameArea {
            width: 100vw;
            max-width: 800px;
            height: 100vh;
            max-height: 450px;
            background-image: url('background.png'); 
            background-color: #87CEEB; 
            background-size: auto 100%; 
            background-repeat: repeat-x; 
            background-position: 0px 0px;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #8B4513;
            border-top: 4px solid #556B2F;
        }

        /* שילוב התמונה של יפית - גודל 70 פיקסלים */
        #player {
            position: absolute;
            bottom: 90px; 
            left: 60px;
            width: 70px;  
            height: 70px; 
            background-image: url('Yafit.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .blinking {
            animation: blink 0.2s linear infinite;
        }

        /* שילוב התמונה של ניסים - גודל 70 פיקסלים */
        .enemy {
            position: absolute;
            bottom: 90px;
            left: 850px;
            width: 70px;  
            height: 70px; 
            background-image: url('Nisim.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            transition: bottom 0.3s ease; 
        }

        /* שילוב התמונה של גזר - גודל 45 פיקסלים */
        .carrot {
            position: absolute;
            bottom: 180px; 
            left: 1200px;
            width: 45px;  
            height: 45px; 
            background-image: url('carrot.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
        }

        #uiBar {
            position: absolute;
            top: 20px;
            right: 20px;
            left: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 3;
        }

        #lives {
            color: #ff4757;
            letter-spacing: 2px;
        }

        .overlayScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
            padding: 20px;
            box-sizing: border-box;
        }

        #countdownScreen {
            display: none;
            background-color: rgba(0, 0, 0, 0.5);
            font-size: 80px;
            color: #fffa65;
        }

        .gameBtn {
            margin-top: 20px;
            padding: 12px 28px;
            font-size: 20px;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .restartBtn {
            background-color: #ff4757;
        }

        #winScreen {
            background-color: rgba(46, 213, 115, 0.85);
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <div id="gameArea">
        <div id="uiBar">
            <div>ניקוד: <span id="score">0</span></div>
            <div id="lives">❤️❤️❤️</div>
        </div>
        
        <div id="player"></div>
        <div id="enemy" class="enemy"></div>
        <div id="carrot" class="carrot"></div>
        <div id="ground"></div>
        
        <div id="startScreen" class="overlayScreen">
            <div style="font-size: 45px; margin-bottom: 10px; color: #fffa65;">Run Nisim! Run!</div>
            <button class="gameBtn" onclick="startCountdown()">התחל משחק</button>
        </div>

        <div id="countdownScreen" class="overlayScreen">3</div>
        
        <div id="gameOverScreen" class="overlayScreen" style="display: none;">
            <div style="max-width: 500px;">לא נורא יפית, ניסים חמקמק פשוט...</div>
            <button class="gameBtn restartBtn" onclick="startCountdown()">נסה שוב</button>
        </div>

        <div id="winScreen" class="overlayScreen" style="display: none;">
            <div style="max-width: 500px; font-size: 36px; color: #fff;">אין עלייך יפית יא תותחית! 😎</div>
            <div style="max-width: 500px; font-size: 24px; margin-top: 15px;">כולנו ידענו שתתפסי את ניסים!</div>
            <button class="gameBtn" onclick="startCountdown()" style="background-color: #222;">שחק שוב</button>
        </div>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const carrot = document.getElementById('carrot');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const startScreen = document.getElementById('startScreen');
        const countdownScreen = document.getElementById('countdownScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const bgMusic = document.getElementById('bgMusic');

        let gameActive = false; 
        let isJumping = false;
        let isInvincible = false;
        let isSquished = false; 
        
        let gravity = 0.6;
        let playerY = 90; 
        let velocity = 0;
        let score = 0;
        let lives = 3; 

        let playerX = 60; 
        let enemyX = 850; 
        let carrotX = 1200;
        let carrotY = 180; 

        let baseSpeed = 5;
        let gameSpeed = baseSpeed; 
        let speedInterval; 
        
        let backgroundPosition = 0; 

        function jump() {
            if (!gameActive || isInvincible) return;
            if (playerY <= 92) { 
                isJumping = true;
                velocity = 12;
            }
        }

        function startCountdown() {
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            winScreen.style.display = 'none'; 
            
            bgMusic.play().catch(error => console.log("המוזיקה תופעל בלחיצה הבאה"));

            resetGameVariables();

            countdownScreen.style.display = 'flex';
            let count = 3;
            countdownScreen.innerText = count;

            let countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownScreen.innerText = count;
                } else {
                    clearInterval(countInterval);
                    countdownScreen.style.display = 'none'; 
                    startGame(); 
                }
            }, 800); 
        }

        function resetGameVariables() {
            score = 0;
            lives = 3;
            gameSpeed = baseSpeed;
            playerY = 90;
            enemyX = 900; 
            carrotX = 1300;
            isSquished = false;
            
            enemy.style.bottom = '90px';

            scoreElement.innerText = score;
            updateLivesUI();
            player.style.bottom = playerY + 'px';
            enemy.style.left = enemyX + 'px';
            carrot.style.left = carrotX + 'px';
        }

        function startGame() {
            gameActive = true;
            startSpeedTimer();
            update(); 
        }

        function startSpeedTimer() {
            clearInterval(speedInterval);
            speedInterval = setInterval(() => {
                if (gameActive) {
                    gameSpeed += 0.7; 
                }
            }, 10000);
        }

        // בדיקה של תוצאת המשחק
        function checkGameEnd() {
            if (score >= 25) {
                gameActive = false;
                winScreen.style.display = 'flex';
                clearInterval(speedInterval);
                bgMusic.pause(); 
                return true;
            }
            if (lives <= 0) {
                gameActive = false;
                gameOverScreen.style.display = 'flex';
                clearInterval(speedInterval);
                bgMusic.pause(); 
                return true;
            }
            return false;
        }

        function handleHit() {
            if (isInvincible || !gameActive || isSquished) return;

            lives--;
            updateLivesUI();

            if (!checkGameEnd()) {
                isInvincible = true;
                player.classList.add('blinking');
                enemyX = 900; 

                setTimeout(() => {
                    isInvincible = false;
                    player.classList.remove('blinking');
                }, 1000);
            }
        }

        function updateLivesUI() {
            let heartString = "";
            for (let i = 0; i < lives; i++) {
                heartString += "❤️";
            }
            livesElement.innerText = heartString || "💀";
        }

        function update() {
            if (!gameActive) return; 

            backgroundPosition -= gameSpeed * 0.5; 
            gameArea.style.backgroundPosition = backgroundPosition + 'px 0px';

            if (isJumping) {
                velocity -= gravity;
                playerY += velocity;

                if (playerY <= 90) {
                    playerY = 90;
                    isJumping = false;
                    velocity = 0;
                }
                player.style.bottom = playerY + 'px';
            }

            let currentWidth = gameArea.offsetWidth;
            if (currentWidth < 800) currentWidth = 800; 

            if (!isSquished) {
                enemyX -= gameSpeed;
                if (enemyX < -70) { 
                    enemyX = currentWidth + Math.random() * 200;
                }
                enemy.style.left = enemyX + 'px';
            }

            carrotX -= gameSpeed;
            if (carrotX < -45) { 
                carrotX = currentWidth + Math.random() * 400 + 200;
            }
            carrot.style.left = carrotX + 'px';

            // התנגשות עם ניסים
            if (!isSquished && enemyX < playerX + 65 && enemyX + 65 > playerX) {
                if (playerY > 125 && velocity < 0) { 
                    score += 10; 
                    scoreElement.innerText = score;
                    
                    // אפקט שקיעה: ניסים יורד עמוק למטה אל תוך האדמה
                    isSquished = true;
                    enemy.style.bottom = '10px';    
                    
                    checkGameEnd();

                    setTimeout(() => {
                        if (gameActive) { 
                            enemy.style.bottom = '90px'; 
                            enemyX = currentWidth + Math.random() * 200; 
                            enemy.style.left = enemyX + 'px';
                            isSquished = false; 
                        }
                    }, 500);

                } else {
                    handleHit();
                }
            }

            // התנגשות עם גזר
            if (carrotX < playerX + 65 && carrotX + 45 > playerX) {
                if (playerY + 70 > carrotY && playerY < carrotY + 45) {
                    score += 1; 
                    scoreElement.innerText = score;
                    checkGameEnd(); 
                    carrotX = currentWidth + Math.random() * 400 + 300; 
                }
            }

            requestAnimationFrame(update);
        }

        // --- האזנה לאירועים (מתוקן למובייל ומחשב) ---
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space') jump();
        });

        // נגיעה בטלפון - התיקון שמאפשר ללחוץ על כפתור ההתחלה!
        gameArea.addEventListener('touchstart', function(event) {
            if (gameActive) {
                jump();
                event.preventDefault(); 
            }
        }, { passive: false });
    </script>

</body>
</html>
